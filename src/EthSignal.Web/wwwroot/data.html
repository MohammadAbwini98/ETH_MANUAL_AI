<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Explorer - ETHUSD Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: #f0f6fc; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: #161b22; border-right: 1px solid #30363d; min-height: calc(100vh - 56px); width: 220px; }
        .sidebar .nav-link { color: #c9d1d9; padding: 8px 16px; font-size: 0.9rem; border-left: 3px solid transparent; }
        .sidebar .nav-link:hover { background: #21262d; color: #f0f6fc; }
        .sidebar .nav-link.active { background: #21262d; color: #58a6ff; border-left-color: #58a6ff; font-weight: 600; }
        .sidebar h6 { color: #8b949e; padding: 12px 16px 4px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .main-content { flex: 1; overflow-x: auto; }
        .toolbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 16px; }
        .data-table { font-size: 0.82rem; }
        .data-table thead th {
            background: #21262d; color: #8b949e; cursor: pointer; position: sticky; top: 0;
            white-space: nowrap; user-select: none; border-bottom: 2px solid #30363d;
        }
        .data-table thead th:hover { color: #58a6ff; }
        .data-table thead th .sort-icon { margin-left: 4px; font-size: 0.7rem; }
        .data-table tbody td { color: #c9d1d9; white-space: nowrap; max-width: 250px; overflow: hidden; text-overflow: ellipsis; }
        .data-table tbody tr:hover { background: #1c2128; }
        .table-dark { --bs-table-bg: #0d1117; --bs-table-color: #c9d1d9; --bs-table-border-color: #21262d; }
        .badge-count { background: #30363d; color: #8b949e; font-size: 0.7rem; margin-left: 6px; }
        .filter-input { background: #0d1117; border: 1px solid #30363d; color: #f0f6fc; font-size: 0.85rem; }
        .filter-input:focus { background: #0d1117; color: #f0f6fc; border-color: #58a6ff; box-shadow: none; }
        .filter-input::placeholder { color: #484f58; }
        .table-container { max-height: calc(100vh - 160px); overflow: auto; }
        .btn-export { font-size: 0.85rem; }
        .empty-state { color: #484f58; text-align: center; padding: 60px 20px; }
        .empty-state h5 { color: #8b949e; }
        .row-count { color: #8b949e; font-size: 0.85rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-3" style="background:#161b22;border-bottom:1px solid #30363d">
    <a class="navbar-brand" href="/" style="color:#58a6ff;font-weight:700">ETHUSD Platform</a>
    <div class="d-flex gap-2">
        <a href="/" class="btn btn-sm btn-outline-secondary">Dashboard</a>
        <a href="/data.html" class="btn btn-sm btn-outline-primary active">Data Explorer</a>
    </div>
</nav>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <h6>Database Tables</h6>
        <nav class="nav flex-column" id="table-list">
            <span class="nav-link text-muted">Loading...</span>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="toolbar d-flex align-items-center gap-3" id="toolbar" style="display:none!important">
            <h6 class="mb-0" id="table-title" style="color:#f0f6fc"></h6>
            <span class="row-count" id="row-count"></span>
            <input type="text" class="form-control form-control-sm filter-input" id="filter-input"
                   placeholder="Filter rows..." style="max-width:300px" oninput="applyFilter()">
            <div class="ms-auto d-flex gap-2">
                <button class="btn btn-sm btn-outline-success btn-export" onclick="exportCsv()">Export CSV</button>
            </div>
        </div>

        <div id="empty-state" class="empty-state">
            <h5>Select a table from the sidebar</h5>
            <p>Click on any table to view its data</p>
        </div>

        <div class="table-container" id="table-container" style="display:none">
            <table class="table table-sm table-dark table-striped data-table" id="data-table">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);

let currentTable = null;
let allColumns = [];
let allRows = [];
let sortCol = null;
let sortDir = 'desc';

async function loadTables() {
    try {
        const r = await fetch('/api/db/tables');
        const tables = await r.json();
        const nav = $('table-list');
        nav.innerHTML = '';
        for (const t of tables) {
            const a = document.createElement('a');
            a.className = 'nav-link';
            a.href = '#';
            a.textContent = t;
            a.onclick = (e) => { e.preventDefault(); selectTable(t); };
            nav.appendChild(a);
        }
    } catch (e) {
        $('table-list').innerHTML = '<span class="nav-link text-danger">Failed to load tables</span>';
    }
}

async function selectTable(name) {
    currentTable = name;

    // Update sidebar active state
    document.querySelectorAll('#table-list .nav-link').forEach(a => {
        a.classList.toggle('active', a.textContent === name);
    });

    $('empty-state').style.display = 'none';
    $('table-container').style.display = 'block';
    $('toolbar').style.display = '';
    $('toolbar').classList.add('d-flex');
    $('table-title').textContent = name;
    $('filter-input').value = '';
    $('table-body').innerHTML = '<tr><td colspan="99" class="text-center text-muted py-4">Loading...</td></tr>';

    try {
        const r = await fetch(`/api/db/query/${name}?limit=5000`);
        const data = await r.json();
        allColumns = data.columns;
        allRows = data.rows;
        sortCol = allColumns[0];
        sortDir = 'desc';
        $('row-count').textContent = `${data.total} rows`;
        renderTable();
    } catch (e) {
        $('table-body').innerHTML = `<tr><td colspan="99" class="text-center text-danger py-4">Error: ${e.message}</td></tr>`;
    }
}

function renderTable() {
    // Header
    const thead = $('table-head');
    thead.innerHTML = '';
    const tr = document.createElement('tr');
    for (const col of allColumns) {
        const th = document.createElement('th');
        th.textContent = col;
        const icon = document.createElement('span');
        icon.className = 'sort-icon';
        if (sortCol === col) {
            icon.textContent = sortDir === 'asc' ? ' \u25B2' : ' \u25BC';
        }
        th.appendChild(icon);
        th.onclick = () => toggleSort(col);
        tr.appendChild(th);
    }
    thead.appendChild(tr);

    // Sort rows
    const sorted = [...allRows].sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (va == null && vb == null) return 0;
        if (va == null) return 1;
        if (vb == null) return -1;

        // Try numeric
        const na = Number(va), nb = Number(vb);
        if (!isNaN(na) && !isNaN(nb)) {
            return sortDir === 'asc' ? na - nb : nb - na;
        }

        // String compare
        va = String(va); vb = String(vb);
        return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    });

    // Filter
    const filter = $('filter-input').value.toLowerCase();
    const filtered = filter
        ? sorted.filter(row => allColumns.some(c => String(row[c] ?? '').toLowerCase().includes(filter)))
        : sorted;

    // Body
    const tbody = $('table-body');
    tbody.innerHTML = '';

    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="99" class="text-center text-muted py-4">No matching rows</td></tr>';
        return;
    }

    for (const row of filtered) {
        const tr = document.createElement('tr');
        for (const col of allColumns) {
            const td = document.createElement('td');
            let val = row[col];
            if (val == null) {
                td.textContent = '';
                td.style.color = '#484f58';
            } else if (typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}T/)) {
                td.textContent = val.replace('T', ' ').slice(0, 19);
            } else if (typeof val === 'number' && !Number.isInteger(val)) {
                td.textContent = val.toFixed(6);
            } else {
                td.textContent = String(val);
            }
            td.title = String(val ?? '');
            tr.appendChild(td);
        }
        tbody.appendChild(tr);
    }

    $('row-count').textContent = filter
        ? `${filtered.length} / ${allRows.length} rows`
        : `${allRows.length} rows`;
}

function toggleSort(col) {
    if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
        sortCol = col;
        sortDir = 'asc';
    }
    renderTable();
}

function applyFilter() {
    renderTable();
}

function exportCsv() {
    if (!currentTable) return;
    window.location.href = `/api/db/export/${currentTable}`;
}

// Init
loadTables();
</script>
</body>
</html>
